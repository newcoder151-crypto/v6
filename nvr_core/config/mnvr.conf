# ============================================================================
# mnvr.conf — Railway mNVR System Configuration
# ============================================================================
# Camera credentials are read directly from the PostgreSQL `cameras` table
# (columns: username, password_hash). You do NOT need to add credentials here.
# Just add cameras via the web UI or seed.js — nvr_core picks them up from DB.
#
# start.sh auto-patches: db_path, storage_base, hls_base from server/.env

# ---- Device identity ----
device_id    = MNVR-TRAIN-001
device_name  = Coach-A NVR

# ---- PostgreSQL connection (auto-patched by start.sh) ----
db_path = host=localhost port=5432 dbname=mnvr user=mnvr password=mnvr sslmode=disable

# ---- Storage paths (auto-patched by start.sh) ----
storage_base = /home/nvr/Documents/ai_mnvr/railway-nvr-v6 (1)/nvr-final2/storage/recordings
hls_base = /home/nvr/Documents/ai_mnvr/railway-nvr-v6 (1)/nvr-final2/storage/hls
log_dir      = /var/log/mnvr

# ---- Recording ----
recording_retention_days = 30
segment_duration_sec     = 900
segment_max_size_mb      = 2048
enable_audio             = true
enable_watermark         = true

# ---- HLS ----
hls_segment_sec          = 4
hls_window_size          = 10
hls_delete_old_segments  = true

# ---- Streaming ----
rtsp_server_port         = 8554
webrtc_server_port       = 8443

# ---- AI ----
enable_face_detection    = true
enable_motion_detection  = true
enable_rdas              = false
motion_threshold         = 0.05

# ---- REST API ----
api_port                 = 8443
api_tls_enabled          = false

# ---- Time sync ----
time_sync_method         = NTP
ntp_server               = pool.ntp.org

# ---- Health monitor ----
health_poll_interval_sec = 10
cpu_warn_threshold       = 85.0
mem_warn_threshold       = 90.0
disk_warn_threshold      = 90.0

# ---- Logging ----
log_min_level            = 2
log_to_syslog            = false

# ---- ONVIF discovery ----
onvif_multicast_ip       = 239.255.255.250
onvif_multicast_port     = 3702
onvif_discovery_interval = 60
onvif_probe_timeout_ms   = 3000
onvif_enable_discovery   = true

# ============================================================
# NOTE: Camera credentials are loaded from PostgreSQL only.
# Add cameras via the web UI. Fields used:
#   cameras.username       -> RTSP/ONVIF username
#   cameras.password_hash  -> RTSP/ONVIF password (plain text for RTSP)
#   cameras.rtsp_url       -> RTSP stream URL (credentials auto-embedded)
#   cameras.ip_address     -> Camera IP for ONVIF
# ============================================================
