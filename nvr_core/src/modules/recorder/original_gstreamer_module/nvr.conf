# Multi-Camera NVR Configuration
# Clean configuration without watermark overhead

# ========================================
# === Global Default Settings ===
# ========================================
[global]

# File Segmentation
# Splits files based on size OR duration (whichever is reached first)
enable_segmentation=true
max_file_duration_sec=3600    # 1 hour segments
max_file_size_mb=2048          # 2GB max (safety limit)

# Network Settings
use_tcp=true                   # Recommended: TCP is more reliable than UDP
rtsp_latency_ms=200           # Buffer latency (increase for unstable networks)
rtsp_timeout_sec=10           # Connection timeout

# File Settings
file_extension=mp4            # Output format: mp4, mkv, avi
add_timestamp=true            # Add timestamp to filenames

# MP4 Optimization
enable_fragments=true         # Enable MP4 fragments for streamable output
fragment_duration_ms=1000     # 1 second fragments

# ========================================
# === Camera Definitions ===
# ========================================

# Camera 1: Front Door
[camera_1]
name=Front Door
camera_url=rtsp://admin:bel123456@172.210.140.91:554/cam/realmonitor?channel=1&subtype=0
output_file=recordings/mycam/front_door

# Override: 30-minute segments for high-traffic area
max_file_duration_sec=60

# ========================================
# Configuration Notes:
# ========================================
# 
# Segmentation Behavior:
# - Files split when EITHER limit is reached (size OR duration)
# - Example: max_file_size_mb=2048 + max_file_duration_sec=3600
#   * 1080p @ 4Mbps = splits at 1 hour (~1.8GB)
#   * 4K @ 12Mbps = splits at ~22 minutes (2GB reached first)
#
# File Naming:
# - Without timestamp: output_file_00000.mp4, output_file_00001.mp4
# - With timestamp: output_file_20250117_143052_00000.mp4
#
# Network Settings:
# - use_tcp=true: More reliable, recommended for production
# - use_tcp=false: Lower latency, but less reliable
# - rtsp_latency_ms: Increase (500-2000) for unstable networks
# - rtsp_timeout_sec: Increase (15-30) for slow cameras
#
# Storage Planning:
# Bitrate × Duration ÷ 8 = File Size
# - 720p @ 2Mbps × 3600s ÷ 8 = ~900MB/hour
# - 1080p @ 4Mbps × 3600s ÷ 8 = ~1.8GB/hour
# - 4K @ 12Mbps × 3600s ÷ 8 = ~5.4GB/hour
#
# ========================================
